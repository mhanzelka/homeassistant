esphome:
  name: ha-display-v1-red
  friendly_name: HA Display V1 Red

esp32:
  board: esp32dev
  framework:
    type: esp-idf

wifi:
  id: my_wifi
  ssid: !secret wifi_ssid
  password: !secret wifi_password

# Shared boilerplate + same HA entities as TTGO + matrix-specific screen
# render lambdas exported as substitutions.
packages:
  common: !include ../common.yaml
  icons: !include icons/icons.yaml
  screen_openings: !include screens/openings.yaml
  screen_text: !include screens/text.yaml
  screen_counter: !include screens/counter.yaml
  screen_progress: !include screens/progress.yaml
  screen_time: !include screens/time.yaml


spi:
  clk_pin: GPIO18
  mosi_pin: GPIO23

time:
  - platform: homeassistant
    id: ha_time

globals:
  # Source of truth for the counter screen. The HA `number.counter_value`
  # is just a sync point — its `on_value` writes here, and the 30 s
  # publish interval mirrors this back to HA. Display reads from here.
  - id: counter_internal
    type: int
    restore_value: no
    initial_value: '0'

  # Opening slots — written by the `on_value` lambda of the
  # `text.openings_state` template entity (HA writes the comma-separated
  # state string, the lambda parses it into these globals).
  # -1 = unknown (HA hasn't written yet), 0 = closed, 1 = open.
  - id: slot_state_0
    type: int
    restore_value: no
    initial_value: '-1'
  - id: slot_state_1
    type: int
    restore_value: no
    initial_value: '-1'
  - id: slot_state_2
    type: int
    restore_value: no
    initial_value: '-1'
  - id: slot_state_3
    type: int
    restore_value: no
    initial_value: '-1'
  - id: slot_state_4
    type: int
    restore_value: no
    initial_value: '-1'

font:
  # 8×8 grid pixel font — designed for retro LED/CRT rendering. `bpp: 1`
  # disables anti-aliasing so edges land on whole pixels (no thresholding
  # artifacts from grayscale rasterization).
  - file: "gfonts://Press Start 2P"
    id: matrix_font
    size: 8
    bpp: 1


display:
  - platform: max7219digit
    id: matrix_display
    cs_pin: GPIO5
    num_chips: 4
    intensity: 5         # initial; overridden by `display_intensity` number from HA
    rotate_chip: 0       # flip to 90/180/270 or set flip_x: true if FC-16 modules show garbled output
    scroll_enable: false # we render frame-by-frame from the lambda; built-in scroll fights with our static screens
    update_interval: 250ms
    lambda: |-
      if (!id(display_on).state) return;

      // Connecting screen: 8×8 smiley face on the left + animated dots.
      // 1 bit = 1 lit pixel; MSB is column 0.
      if (!id(my_wifi).is_connected()) {
        const uint8_t smiley[8] = {
          0b01111110,
          0b10000001,
          0b10100101,   // eyes at cols 2 and 5
          0b10000001,
          0b10111101,   // open mouth — top edge (cols 2..5)
          0b10100101,   // open mouth — sides
          0b10011001,   // open mouth — bottom curve
          0b01111110,
        };
        for (int row = 0; row < 8; row++) {
          for (int col = 0; col < 8; col++) {
            if (smiley[row] & (1 << (7 - col))) {
              it.draw_pixel_at(col, row, Color::WHITE);
            }
          }
        }
        // Three dots cycling — active is a 2×2 square, idle is a single pixel
        const int phase = (millis() / 350) % 3;
        for (int i = 0; i < 3; i++) {
          int dx = 14 + i * 6;   // 14, 20, 26
          if (i == phase) {
            it.filled_rectangle(dx, 3, 2, 2);
          } else {
            it.draw_pixel_at(dx, 3, Color::WHITE);
          }
        }
        return;
      }

      auto screen = id(active_screen).state;
      if (screen == "window_and_door_openings") {
        ${openings_render}
      } else if (screen == "text") {
        ${text_render}
      } else if (screen == "counter") {
        ${counter_render}
      } else if (screen == "progress") {
        ${progress_render}
      } else if (screen == "time") {
        ${time_render}
      }

# HA-controllable LED brightness (0-15). Persisted across reboots.
number:
  - platform: template
    name: "Display Intensity"
    id: display_intensity
    icon: "mdi:brightness-6"
    min_value: 0
    max_value: 15
    step: 1
    initial_value: 5
    optimistic: true
    restore_value: true
    on_value:
      - lambda: |-
          // intensity() pushes to chips immediately; set_intensity() only
          // updates the member variable and never reaches the SPI bus.
          id(matrix_display).intensity((uint8_t) x);

  # HA write interface for the counter screen. Source of truth lives in
  # the `counter_internal` global on the device — `on_value` syncs HA
  # writes into it, and the 30 s publish interval mirrors the global
  # back here for HA visibility. The diff check in `on_value` prevents
  # a feedback loop with our own `publish_state` calls.
  - platform: template
    name: "Counter Value"
    id: counter_value
    icon: "mdi:timer-sand"
    mode: box
    min_value: 0
    max_value: 108000
    step: 1
    initial_value: 0
    optimistic: true
    restore_value: false
    on_value:
      - lambda: |-
          int new_val = (int) x;
          if (new_val != id(counter_internal)) {
            id(counter_internal) = new_val;
          }

  # Drives the bar fill on the progress screen. HA automation writes
  # the current percentage as the underlying source advances.
  - platform: template
    name: "Progress Value"
    id: progress_value
    icon: "mdi:progress-helper"
    min_value: 0
    max_value: 100
    step: 1
    initial_value: 0
    optimistic: true
    restore_value: false

# HA-controllable active screen. Adding a new screen = one more option
# here + one more `else if` branch in the display lambda above.
select:
  - platform: template
    name: "Active Screen"
    id: active_screen
    icon: "mdi:monitor-dashboard"
    optimistic: true
    restore_value: true
    options:
      - "window_and_door_openings"
      - "text"
      - "counter"
      - "progress"
      - "time"
    initial_option: "window_and_door_openings"

  # Picks which icon the progress screen renders on the left. Adding a
  # new icon = add a new entry in icons/icons.yaml + append its name
  # here.
  - platform: template
    name: "Progress Icon"
    id: progress_icon
    icon: "mdi:image-outline"
    optimistic: true
    restore_value: true
    options:
      - "printer"
    initial_option: "printer"

  # Alignment for the text screen.
  - platform: template
    name: "Text Screen Alignment"
    id: text_screen_align
    icon: "mdi:format-align-center"
    optimistic: true
    restore_value: true
    options:
      - "left"
      - "center"
      - "right"
    initial_option: "center"

# HA-controllable on/off toggle. Display lambda short-circuits when off,
# leaving the auto-cleared buffer (= all LEDs unlit).
switch:
  - platform: template
    name: "Display On"
    id: display_on
    icon: "mdi:monitor"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON

  # Marquee scroll for the text screen. When off, the configured alignment
  # is used; when on, text scrolls right→left if it overflows the canvas.
  - platform: template
    name: "Text Screen Scrolling"
    id: text_screen_scrolling
    icon: "mdi:rotate-3d-variant"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF

  # When ON, the counter increments by 1 every second autonomously
  # (see `interval:` below). HA only needs to toggle this; no per-tick
  # service call.
  - platform: template
    name: "Counter Auto Tick"
    id: counter_auto_tick
    icon: "mdi:timer-play"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF

interval:
  # 1 Hz tick: increments the local global only — no HA traffic per tick.
  - interval: 1s
    then:
      - if:
          condition:
            switch.is_on: counter_auto_tick
          then:
            - lambda: |-
                id(counter_internal) += 1;

  # Mirror the global back to HA every 30 s while ticking, so the HA UI
  # stays roughly in sync without 1 message per second.
  - interval: 30s
    then:
      - if:
          condition:
            switch.is_on: counter_auto_tick
          then:
            - lambda: |-
                id(counter_value).publish_state((float) id(counter_internal));

# Free-form text shown by the text screen.
text:
  - platform: template
    name: "Text Screen Content"
    id: text_screen_content
    icon: "mdi:text"
    mode: text
    min_length: 0
    max_length: 100
    optimistic: true
    restore_value: true
    initial_value: "Hello"

  # Push-based opening states. HA writes a comma-separated string like
  # "1,0,1,0,0" (5 slots: Kitchen,Living,Kids,Balcony,Hallway) and the
  # `on_value` lambda parses it into `slot_state_*` globals. The device
  # never subscribes to specific HA binary_sensors directly, so the user
  # can re-wire which real sensor maps to which slot purely from a HA
  # automation — no re-flash needed.
  - platform: template
    name: "Openings"
    id: openings_state
    icon: "mdi:window-open-variant"
    mode: text
    min_length: 0
    max_length: 32
    optimistic: true
    restore_value: false
    initial_value: ""
    on_value:
      - lambda: |-
          int *slots[5] = {
            &id(slot_state_0), &id(slot_state_1), &id(slot_state_2),
            &id(slot_state_3), &id(slot_state_4),
          };
          const std::string &s = x;
          size_t start = 0;
          int idx = 0;
          while (idx < 5) {
            size_t pos = s.find(',', start);
            std::string token = (pos == std::string::npos)
                                ? s.substr(start) : s.substr(start, pos - start);
            while (!token.empty() && token.front() == ' ') token.erase(0, 1);
            while (!token.empty() && token.back()  == ' ') token.pop_back();
            if (token == "1")      *slots[idx] = 1;
            else if (token == "0") *slots[idx] = 0;
            else                   *slots[idx] = -1;
            idx++;
            if (pos == std::string::npos) break;
            start = pos + 1;
          }
          while (idx < 5) { *slots[idx] = -1; idx++; }
