blueprint:
  name: "Motion Activated Lights V1"
  description: >
    Turns one or more lights on when any of the selected motion / presence
    sensors detects activity, and turns them off after a configurable delay
    once ALL monitored sensors report no motion.

    Optional "take control" mode controls behaviour when a light was already
    on at the moment motion was first detected: when OFF (default) such
    lights are left alone after the delay; when ON the automation turns
    them off regardless.
  domain: automation
  author: mhanzelka
  input:

    # ── Section: Devices ──────────────────────────────────────────────────────

    section_devices:
      name: Devices
      icon: mdi:motion-sensor
      input:

        motion_sensors:
          name: Motion / presence sensors
          description: >
            One or more binary sensors. The lights turn on whenever ANY of
            them switches to "on". The off-delay starts only after ALL of
            them are "off".
          selector:
            entity:
              domain: binary_sensor
              multiple: true
              filter:
                - device_class: motion
                - device_class: occupancy
                - device_class: presence

        lights:
          name: Lights
          description: >
            One or more light entities to control.
          selector:
            entity:
              domain: light
              multiple: true

    # ── Section: Behavior ─────────────────────────────────────────────────────

    section_behavior:
      name: Behavior
      icon: mdi:cog-outline
      collapsed: true
      input:

        no_motion_wait:
          name: Wait time after no motion
          description: >
            How long all sensors must report no motion before the lights are
            turned off. The countdown restarts whenever any sensor detects
            motion again.
          default:
            hours: 0
            minutes: 2
            seconds: 0
          selector:
            duration:

        take_control:
          name: Take control
          description: >
            When ON, lights are turned off after the delay even if they were
            already on before motion started. When OFF (default), lights
            that were already on at the moment of detection are left alone
            (assumed to be under manual / other control).
          default: false
          selector:
            boolean:

        motion_schedule:
          name: Active schedule (optional)
          description: >
            A Home Assistant schedule helper that restricts when motion
            activates the lights. Motion is processed only while this
            schedule is "on" — outside its blocks, motion is ignored.
            Create one under Settings → Helpers → Schedule. Leave empty
            to disable scheduling (motion always works).
          default: {}
          selector:
            entity:
              domain: schedule

        illuminance_sensor:
          name: Illuminance sensor (optional)
          description: >
            A sensor reporting illuminance in lux. When configured, motion
            only turns the lights on if ALL controlled lights are currently
            off AND the sensor reads below the lux threshold. Once any
            light is on, the lux check is skipped (the sensor would be
            polluted by the lights themselves). Leave empty to disable the
            lux gate.
          default: {}
          selector:
            entity:
              domain: sensor
              device_class: illuminance

        lux_threshold:
          name: Lux threshold
          description: >
            Minimum illuminance (lux) below which motion is allowed to turn
            the lights on. Only applies when an illuminance sensor is
            configured and all controlled lights are currently off.
          default: 50
          selector:
            number:
              min: 0
              max: 1000
              step: 1
              unit_of_measurement: "lx"
              mode: slider

        disable_entities:
          name: Disable entities (optional)
          description: >
            While ANY of these entities is "on", the automation will not
            start a new cycle, and any currently running cycle is
            interrupted (the controlled lights are turned off
            immediately). Once ALL of them go back to "off" while motion
            is still detected, the lights are turned on again and the
            normal grace-period logic resumes. Typical use: a main
            ceiling light that should override a motion-activated lamp.
          default: []
          selector:
            entity:
              multiple: true
              filter:
                - domain: light
                - domain: switch
                - domain: input_boolean
                - domain: binary_sensor

# ── Variables ─────────────────────────────────────────────────────────────────
# Resolve !input references into template variables so they can be used inside
# Jinja2 expressions.

variables:
  var_motion_sensors:     !input motion_sensors
  var_lights:             !input lights
  var_take_control:       !input take_control
  var_disable_entities:   !input disable_entities
  var_motion_schedule:    !input motion_schedule
  var_illuminance_sensor: !input illuminance_sensor
  var_lux_threshold:      !input lux_threshold

# ── Triggers ──────────────────────────────────────────────────────────────────

trigger:
  # Any monitored motion / presence sensor reports activity
  - platform: state
    entity_id: !input motion_sensors
    to: "on"
    id: motion
  # A disable entity went back to off → maybe resume cycle
  - platform: state
    entity_id: !input disable_entities
    to: "off"
    id: disable

# ── Conditions ────────────────────────────────────────────────────────────────

condition:
  # Motion trigger: skip if any disable entity is currently on.
  # Disable trigger: skip unless ALL disable entities are off AND motion is
  # currently active (otherwise there's nothing to resume).
  - condition: template
    value_template: >
      {% set disable_on = (var_disable_entities | count > 0) and
                          (expand(var_disable_entities)
                            | selectattr('state','eq','on') | list | count > 0) %}
      {% set motion_on  = expand(var_motion_sensors)
                            | selectattr('state','eq','on') | list | count > 0 %}
      {% set schedule_ok = (var_motion_schedule in [{}, '', none]) or
                           is_state(var_motion_schedule, 'on') %}
      {% set lights_all_off = expand(var_lights)
                                | selectattr('state','eq','on')
                                | list | count == 0 %}
      {% set lux_ok = (var_illuminance_sensor in [{}, '', none])
                      or (not lights_all_off)
                      or (states(var_illuminance_sensor) | float(99999)
                          < var_lux_threshold | float) %}
      {% if trigger.id == 'motion' %}
        {{ (not disable_on) and schedule_ok and lux_ok }}
      {% else %}
        {{ (not disable_on) and motion_on and schedule_ok and lux_ok }}
      {% endif %}

# ── Actions ───────────────────────────────────────────────────────────────────

action:
  # Snapshot of which lights were already on before motion was detected.
  # Used later to decide whether the automation owns them for auto-off.
  - variables:
      lights_were_on: >
        {{ expand(var_lights)
           | selectattr('state','eq','on') | list | count > 0 }}

  # Turn on the lights. light.turn_on without parameters is idempotent —
  # already-on lights are not disturbed (no brightness / colour override).
  - service: light.turn_on
    target:
      entity_id: !input lights

  # Cancelable grace period: wait until all sensors are clear, then wait
  # the configured delay. New motion during the delay loops back instead
  # of ending the cycle. The loop exits only when wait_for_trigger times
  # out (`wait.trigger == none`), i.e. the room stayed empty.
  - repeat:
      sequence:
        # Wait until motion clears OR a disable entity goes on.
        - wait_template: >
            {% set motion_off = expand(var_motion_sensors)
                                  | selectattr('state','eq','on')
                                  | list | count == 0 %}
            {% set disabled = (var_disable_entities | count > 0) and
                              (expand(var_disable_entities)
                                | selectattr('state','eq','on')
                                | list | count > 0) %}
            {{ motion_off or disabled }}

        # If we exited because a disable entity is now on, stop immediately.
        - if:
            - condition: template
              value_template: >
                {{ (var_disable_entities | count > 0) and
                   (expand(var_disable_entities)
                     | selectattr('state','eq','on')
                     | list | count > 0) }}
          then:
            - service: light.turn_off
              target:
                entity_id: !input lights
            - stop: "Disabled by override entity"

        - wait_for_trigger:
            - platform: state
              entity_id: !input motion_sensors
              to: "on"
            - platform: state
              entity_id: !input disable_entities
              to: "on"
          timeout: !input no_motion_wait
          continue_on_timeout: true
      until:
        - condition: template
          value_template: >
            {{ wait.trigger == none
               or (wait.trigger is not none
                   and wait.trigger.entity_id in var_disable_entities) }}

  # Disable-on inside the grace-period wait → force off and stop.
  - if:
      - condition: template
        value_template: >
          {{ wait.trigger is not none
             and wait.trigger.entity_id in var_disable_entities }}
    then:
      - service: light.turn_off
        target:
          entity_id: !input lights
      - stop: "Disabled by override entity"

  # Turn off lights either when "take control" is enabled, or when none of
  # the lights were already on at the moment motion was first detected.
  - if:
      - condition: template
        value_template: "{{ var_take_control or not lights_were_on }}"
    then:
      - service: light.turn_off
        target:
          entity_id: !input lights

mode: single
