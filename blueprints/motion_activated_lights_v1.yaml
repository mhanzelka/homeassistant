blueprint:
  name: "Motion Activated Lights V1"
  description: >
    Turns one or more lights on when any of the selected motion / presence
    sensors detects activity, and turns them off after a configurable delay
    once ALL monitored sensors report no motion.

    Optional "take control" mode controls behaviour when a light was already
    on at the moment motion was first detected: when OFF (default) such
    lights are left alone after the delay; when ON the automation turns
    them off regardless.
  domain: automation
  author: mhanzelka
  input:

    # ── Section: Devices ──────────────────────────────────────────────────────

    section_devices:
      name: Devices
      icon: mdi:motion-sensor
      input:

        motion_sensors:
          name: Motion / presence sensors
          description: >
            One or more binary sensors. The lights turn on whenever ANY of
            them switches to "on". The off-delay starts only after ALL of
            them are "off".
          selector:
            entity:
              domain: binary_sensor
              multiple: true
              filter:
                - device_class: motion
                - device_class: occupancy
                - device_class: presence

        lights:
          name: Lights
          description: >
            One or more light entities to control.
          selector:
            entity:
              domain: light
              multiple: true

    # ── Section: Behavior ─────────────────────────────────────────────────────

    section_behavior:
      name: Behavior
      icon: mdi:cog-outline
      collapsed: true
      input:

        no_motion_wait:
          name: Wait time after no motion
          description: >
            How long all sensors must report no motion before the lights are
            turned off. The countdown restarts whenever any sensor detects
            motion again.
          default:
            hours: 0
            minutes: 2
            seconds: 0
          selector:
            duration:

        take_control:
          name: Take control
          description: >
            When ON, lights are turned off after the delay even if they were
            already on before motion started. When OFF (default), lights
            that were already on at the moment of detection are left alone
            (assumed to be under manual / other control).
          default: false
          selector:
            boolean:

# ── Variables ─────────────────────────────────────────────────────────────────
# Resolve !input references into template variables so they can be used inside
# Jinja2 expressions.

variables:
  var_motion_sensors: !input motion_sensors
  var_lights:         !input lights
  var_take_control:   !input take_control

# ── Triggers ──────────────────────────────────────────────────────────────────

trigger:
  # Any monitored motion / presence sensor reports activity
  - platform: state
    entity_id: !input motion_sensors
    to: "on"

# ── Conditions ────────────────────────────────────────────────────────────────

condition: []

# ── Actions ───────────────────────────────────────────────────────────────────

action:
  # Capture which lights were already on BEFORE we touch anything. Used later
  # to decide whether the automation "owns" the lights for the auto-off step.
  #
  # IMPORTANT: With mode: single (see bottom of file) this snapshot is taken
  # exactly once per activation cycle. A returning user during the grace
  # period does NOT re-trigger the automation, so the value reflects the
  # true pre-automation state and is never overwritten by lights that this
  # automation itself turned on.
  - variables:
      lights_were_on: >
        {{ expand(var_lights)
           | selectattr('state','eq','on') | list | count > 0 }}

  # Turn on the lights. light.turn_on without parameters is idempotent —
  # already-on lights are not disturbed (no brightness / colour override).
  - service: light.turn_on
    target:
      entity_id: !input lights

  # ── Interruptible grace-period loop ────────────────────────────────────────
  # The original implementation used a plain `delay` plus mode: restart. That
  # combination has a subtle bug: when motion returns during the delay the
  # whole script restarts, the `lights_were_on` snapshot is recaptured, and
  # because the lights are now on (we just turned them on) the automation
  # mistakenly believes the user is in control and never turns them off.
  #
  # Instead we keep mode: single and simulate a *cancelable* delay here:
  #
  #   1. wait_template — pause until ALL motion sensors are clear.
  #   2. wait_for_trigger with `timeout` — wait the configured grace period,
  #      but break out early if any motion sensor fires again.
  #   3. The until-condition exits the loop only when the wait_for_trigger
  #      ended via timeout (`wait.trigger == none`), i.e. the room really
  #      stayed empty for the full grace period. Any earlier motion just
  #      loops back to step 1 without losing the original `lights_were_on`.
  - repeat:
      sequence:
        # Wait until ALL motion sensors report no motion.
        - wait_template: >
            {{ expand(var_motion_sensors)
               | selectattr('state','eq','on') | list | count == 0 }}

        # Cancelable grace period: completes either when the timeout elapses
        # (success — nobody came back) or when a sensor reports motion again
        # (loop continues). `continue_on_timeout: true` keeps the script
        # running on timeout so we can inspect `wait.trigger`.
        - wait_for_trigger:
            - platform: state
              entity_id: !input motion_sensors
              to: "on"
          timeout: !input no_motion_wait
          continue_on_timeout: true
      until:
        # `wait.trigger` is the trigger object that fired, or `none` when
        # the timeout elapsed. Only the timeout case ends the cycle.
        - condition: template
          value_template: "{{ wait.trigger == none }}"

  # Turn off lights either when "take control" is enabled, or when none of
  # the lights were already on at the moment motion was first detected.
  - if:
      - condition: template
        value_template: "{{ var_take_control or not lights_were_on }}"
    then:
      - service: light.turn_off
        target:
          entity_id: !input lights

# Single-run mode: while one cycle is in progress, additional motion events
# are absorbed by the wait_for_trigger inside the loop above instead of
# restarting the script (which would clobber `lights_were_on`).
mode: single
